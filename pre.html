<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Chatbot</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        
        body {
            background-image: url("{{ url_for('static', filename='slv.jpeg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .overlay {
            width: 100%;
            height: 100vh;
            background: rgba(0, 0, 0, 0.35);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .chat-container {
            width: 95%;
            max-width: 900px;
            height: 90vh;
            background: rgba(15, 23, 42, 0.75);
            border-radius: 20px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-header {
            background: #2563eb;
            padding: 20px;
            color: white;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        
        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }
        
        .message {
            max-width: 75%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 15px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }
        
        .user {
            background: #2563eb;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        
        .bot {
            background: #1e293b;
            color: white;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }
        
        .chat-input {
            display: flex;
            padding: 15px;
            background: #0f172a;
        }
        
        .chat-input input {
            flex: 1;
            padding: 15px;
            border: none;
            outline: none;
            border-radius: 10px;
            font-size: 16px;
            background: #1e293b;
            color: white;
        }
        
        .chat-input input::placeholder {
            color: #cbd5e1;
        }
        
        .chat-input button {
            margin-left: 10px;
            padding: 15px 25px;
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 16px;
        }
        
        .chat-input button:hover {
            background: #1d4ed8;
        }
        
        .footer-bar {
            text-align: center;
            color: #cbd5e1;
            font-size: 14px;
            margin-top: 12px;
        }
        
        .footer-bar span {
            display: block;
            margin-top: 4px;
        }
        
        .option-btn {
            background: #0ea5e9;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 10px;
            margin: 5px;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .option-btn:hover {
            background: #0284c7;
            transform: scale(1.05);
        }
        
        .feedback-btn {
            background: #ef4444;
        }
        
        .feedback-btn:hover {
            background: #dc2626;
        }
        
        .typing {
            color: #cbd5e1;
            font-style: italic;
            margin-bottom: 15px;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media(max-width:700px) {
            .message {
                max-width: 90%;
            }
            .chat-header {
                font-size: 20px;
            }
        }
    </style>

</head>

<body>

    <div class="overlay">

        <div class="chat-container">

            <div class="chat-header">
                🤖 WELCOME TO AI CHATBOT
            </div>

            <div class="chat-box" id="chatBox">

                <div class="message bot">
                    Hello 👋 <br><br> Ask me anything.
                </div>

            </div>

            <div class="chat-input">

                <input type="text" id="questionInput" placeholder="Type your question...">

                <button onclick="sendMessage()">
                    Send
                </button>

            </div>

        </div>
        <div class="footer-bar">
            Managed by KC Charities and KC Vaseemkan
            <span>Powered by AI Chatbot</span>
        </div>

    </div>

    <script>
        const chatBox = document.getElementById("chatBox");

        const questionInput = document.getElementById("questionInput");

        questionInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                sendMessage();
            }
        });

        function addMessage(text, sender) {
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message");
            messageDiv.classList.add(sender);
            messageDiv.innerHTML = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function showTyping() {
            const typing = document.createElement("div");
            typing.classList.add("typing");
            typing.id = "typing";
            typing.innerHTML = "AI is typing...";
            chatBox.appendChild(typing);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById("typing");
            if (typing) {
                typing.remove();
            }
        }

        async function sendMessage() {
            const question = questionInput.value.trim();
            if (question === "") {
                return;
            }
            addMessage(question, "user");
            questionInput.value = "";
            showTyping();
            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        question: question
                    })
                });
                const data = await response.json();
                removeTyping();
                let botResponse = `
                    <b>Answer:</b><br>
                    ${data.answer}

                    <br><br>

                    <b>Emotion:</b>
                    ${data.emotion_type}

                    <br>

                    <b>Confidence:</b>
                    ${data.accuracy_score}%
                `;
                if (data.recommended_options && data.recommended_options.length > 0) {
                    botResponse += `
                        <div class="options">
                        <b>Recommended Options:</b><br>
                    `;
                    data.recommended_options.forEach(option => {
                        if (option !== "") {
                            botResponse += `
                                    <button
                                        class="option-btn"
                                        onclick="selectOption('${option}')"
                                    >
                                        ${option}
                                    </button>
                                `;
                        }
                    });
                    botResponse += `</div>`;
                }
                botResponse += `
                    <br>

                    <button
                        class="option-btn feedback-btn"
                        onclick="sendFeedback()"
                    >
                        Not Satisfied
                    </button>
                `;
                addMessage(botResponse, "bot");
            } catch (error) {
                removeTyping();
                addMessage("⚠ Server Error. Please try again.", "bot");
                console.log(error);
            }
        }

        function selectOption(option) {
            questionInput.value = option;
            sendMessage();
        }

        async function sendFeedback() {
            showTyping();
            try {
                const response = await fetch("/feedback", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        feedback: "User not satisfied"
                    })
                });
                const data = await response.json();
                removeTyping();
                addMessage(data.message, "bot");
            } catch (error) {
                removeTyping();
                addMessage("We will improve soon.", "bot");
            }
        }
    </script>

</body>

</html>
